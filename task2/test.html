<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лабораторная 2</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="header">
    <h1>Тест по союзам</h1>
    <a href="index.html" class="nav-button">На главную</a>
  </header>
  <main class="content">
    <form class="form" id="form-1">
      <!-- Вопрос 1 -->
      <div class="question">
        <div class="question-text">1. К какому разряду по значению относится союз «причём»?</div>
        <div>
          <input type="radio" name="q1" id="q1-1" value="1">
          <label for="q1-1">Противительный</label>
        </div>
        <div>
          <input type="radio" name="q1" id="q1-2" value="2">
          <label for="q1-2">Градационный</label>
        </div>
        <div>
          <input type="radio" name="q1" id="q1-3" value="3">
          <label for="q1-3">Присоединительный</label>
        </div>
        <div>
          <input type="radio" name="q1" id="q1-4" value="4">
          <label for="q1-4">Пояснительный</label>
        </div>
        <div>
          <input type="radio" name="q1" id="q1-5" value="5">
          <label for="q1-5">Разделительный</label>
        </div>
      </div>
      <!-- Вопрос 2 -->
      <div class="question">
        <div class="question-text">2. Отметьте непроизводный союз.</div>
        <div>
          <input type="radio" name="q2" id="q2-1" value="1">
          <label for="q2-1">как будто</label>
        </div>
        <div>
          <input type="radio" name="q2" id="q2-2" value="2">
          <label for="q2-2">до тех пор</label>
        </div>
        <div>
          <input type="radio" name="q2" id="q2-3" value="3">
          <label for="q2-3">в то время как</label>
        </div>
        <div>
          <input type="radio" name="q2" id="q2-4" value="4">
          <label for="q2-4">a</label>
        </div>
        <div>
          <input type="radio" name="q2" id="q2-5" value="5">
          <label for="q2-5">хотя</label>
        </div>
      </div>
      <!-- Вопрос 3 -->
      <div class="question">
        <div class="question-text">3. Отметьте подчинительные союзы.</div>
        <div>
          <input type="checkbox" name="q3" id="q3-1" value="1">
          <label for="q3-1">чтобы</label>
        </div>
        <div>
          <input type="checkbox" name="q3" id="q3-2" value="2">
          <label for="q3-2">также</label>
        </div>
        <div>
          <input type="checkbox" name="q3" id="q3-3" value="3">
          <label for="q3-3">что</label>
        </div>
        <div>
          <input type="checkbox" name="q3" id="q3-4" value="4">
          <label for="q3-4">a именно</label>
        </div>
        <div>
          <input type="checkbox" name="q3" id="q3-5" value="5">
          <label for="q3-5">притом</label>
        </div>
      </div>

      <button class="submit-button" type="submit">Отправить на проверку</button>
    </form>
    <div id="result-box" class="result-box"></div>
  </main>
  <script src="script.js"></script>
</body>

</html>
